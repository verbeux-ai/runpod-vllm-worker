name: Build & Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'handler.py'
      - 'turboquant_patch.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker builder (Blacksmith)
        uses: useblacksmith/setup-docker-builder@v1

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen36-vllm-worker:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/qwen36-vllm-worker:${{ github.sha }}
