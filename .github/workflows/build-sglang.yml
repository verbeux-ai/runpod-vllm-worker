name: Build & Push SGLang to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.sglang'
      - 'handler_sglang.py'
      - 'entrypoint_sglang.sh'
      - 'prebake.py'
      - '.github/workflows/build-sglang.yml'
  workflow_dispatch:
    inputs:
      prebake_model:
        description: 'HF repo to pre-bake'
        required: false
        default: 'sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android
          df -h

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sglang
          platforms: linux/amd64
          push: true
          build-args: |
            PREBAKE_MODEL=${{ github.event.inputs.prebake_model || 'sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP' }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/sglang-worker:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/sglang-worker:${{ github.sha }}
